openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Framelink API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: prototypes
    description: Prototype operations
  - name: comments
    description: Comment operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /prototypes:
    post:
      operationId: createPrototype
      tags: [prototypes]
      summary: Upload an HTML prototype
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrototypeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prototype"
    get:
      operationId: listPrototypes
      tags: [prototypes]
      summary: List recent prototypes
      responses:
        "200":
          description: List of recent prototypes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PrototypeMeta"

  /prototypes/{id}:
    get:
      operationId: getPrototype
      tags: [prototypes]
      summary: Get prototype by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Prototype found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prototype"
        "404":
          description: Not found

  /prototypes/{id}/comments:
    get:
      operationId: getComments
      tags: [comments]
      summary: Get all comments for a prototype
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [comments]
      summary: Add a comment to a prototype
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /comments/{id}/resolve:
    patch:
      operationId: resolveComment
      tags: [comments]
      summary: Mark a comment as resolved
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comment resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    PrototypeInput:
      type: object
      required: [htmlContent, fileName]
      properties:
        htmlContent:
          type: string
        fileName:
          type: string

    Prototype:
      type: object
      required: [id, htmlContent, fileName, createdAt]
      properties:
        id:
          type: string
        htmlContent:
          type: string
        fileName:
          type: string
        createdAt:
          type: string

    PrototypeMeta:
      type: object
      required: [id, fileName, createdAt]
      properties:
        id:
          type: string
        fileName:
          type: string
        createdAt:
          type: string

    CommentInput:
      type: object
      required: [x, y, text]
      properties:
        x:
          type: number
        y:
          type: number
        text:
          type: string

    Comment:
      type: object
      required: [id, prototypeId, x, y, text, resolved, createdAt]
      properties:
        id:
          type: string
        prototypeId:
          type: string
        x:
          type: number
        y:
          type: number
        text:
          type: string
        resolved:
          type: boolean
        createdAt:
          type: string
