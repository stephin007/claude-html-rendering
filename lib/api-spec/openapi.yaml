openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Framelink API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Project operations
  - name: prototypes
    description: Prototype operations
  - name: comments
    description: Comment operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMeta"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project with its files
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Rename a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdateInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project and all its files
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "404":
          description: Not found

  /prototypes:
    post:
      operationId: createPrototype
      tags: [prototypes]
      summary: Upload an HTML file to a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrototypeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prototype"
    get:
      operationId: listPrototypes
      tags: [prototypes]
      summary: List recent prototypes
      responses:
        "200":
          description: List of recent prototypes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PrototypeMeta"

  /prototypes/{id}:
    get:
      operationId: getPrototype
      tags: [prototypes]
      summary: Get prototype by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Prototype found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prototype"
        "404":
          description: Not found
    patch:
      operationId: updatePrototype
      tags: [prototypes]
      summary: Rename a prototype file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrototypeUpdateInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prototype"
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: deletePrototype
      tags: [prototypes]
      summary: Delete a prototype and all its comments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "404":
          description: Not found

  /prototypes/{id}/comments:
    get:
      operationId: getComments
      tags: [comments]
      summary: Get all comments for a prototype
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [comments]
      summary: Add a comment to a prototype
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /comments/{id}/resolve:
    patch:
      operationId: toggleCommentResolved
      tags: [comments]
      summary: Toggle a comment resolved/unresolved
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "404":
          description: Not found

  /comments/{id}:
    patch:
      operationId: updateComment
      tags: [comments]
      summary: Update a comment's text
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentUpdateInput"
      responses:
        "200":
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "404":
          description: Not found
    delete:
      operationId: deleteComment
      tags: [comments]
      summary: Delete a comment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DeleteResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    ProjectInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255

    ProjectUpdateInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255

    Project:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string

    ProjectMeta:
      type: object
      required: [id, name, fileCount, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        fileCount:
          type: integer
        createdAt:
          type: string

    ProjectDetail:
      type: object
      required: [id, name, createdAt, prototypes]
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
        prototypes:
          type: array
          items:
            $ref: "#/components/schemas/PrototypeMeta"

    PrototypeInput:
      type: object
      required: [htmlContent, fileName, projectId]
      properties:
        htmlContent:
          type: string
          maxLength: 20971520
        fileName:
          type: string
          maxLength: 255
        projectId:
          type: string

    PrototypeUpdateInput:
      type: object
      required: [fileName]
      properties:
        fileName:
          type: string

    Prototype:
      type: object
      required: [id, htmlContent, fileName, projectName, projectId, createdAt]
      properties:
        id:
          type: string
        htmlContent:
          type: string
        fileName:
          type: string
        projectName:
          type: string
        projectId:
          type: string
        thumbnail:
          type: string
          nullable: true
        createdAt:
          type: string

    PrototypeMeta:
      type: object
      required: [id, fileName, projectName, projectId, createdAt]
      properties:
        id:
          type: string
        fileName:
          type: string
        projectName:
          type: string
        projectId:
          type: string
        thumbnail:
          type: string
          nullable: true
        createdAt:
          type: string

    CommentInput:
      type: object
      required: [x, y, text]
      properties:
        x:
          type: number
        y:
          type: number
        text:
          type: string
          maxLength: 10000
        thumbnail:
          type: string
          nullable: true

    CommentUpdateInput:
      type: object
      required: [text]
      properties:
        text:
          type: string
          maxLength: 10000

    Comment:
      type: object
      required: [id, prototypeId, x, y, text, resolved, createdAt]
      properties:
        id:
          type: string
        prototypeId:
          type: string
        x:
          type: number
        y:
          type: number
        text:
          type: string
        resolved:
          type: boolean
        authorEmail:
          type: string
          nullable: true
        thumbnail:
          type: string
          nullable: true
        createdAt:
          type: string
