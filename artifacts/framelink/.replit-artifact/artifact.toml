kind = "web"
previewPath = "/"
title = "Framelink"
version = "1.0.0"
id = "artifacts/framelink"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22081

[services.development]
run = "pnpm --filter @workspace/framelink run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/framelink", "run", "build" ]
publicDir = "artifacts/framelink/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22081"
BASE_PATH = "/"
